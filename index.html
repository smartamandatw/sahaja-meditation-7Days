<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F0E8D0">
<title>七天練習 · 霎哈嘉瑜伽</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F0E8D0;
    --gold:#C9A84C;
    --ink:#1C1A17;
    --ink-soft:rgba(28,26,23,0.62);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Serif TC', serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .wrap{
    max-width:400px;
    width:100%;
    text-align:center;
  }
  .mark{
    width:52px;height:52px;
    margin:0 auto 28px;
    border-radius:50%;
    border:1.5px solid var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
    color:var(--gold);
    opacity:0;
    animation:fadeUp .7s ease forwards;
  }
  h1{
    font-size:30px;
    line-height:1.4;
    margin:0 0 14px;
    font-weight:700;
    opacity:0;
    animation:fadeUp .7s ease .1s forwards;
  }
  .tagline{
    font-size:15px;
    line-height:1.85;
    color:var(--ink-soft);
    margin-bottom:36px;
    opacity:0;
    animation:fadeUp .7s ease .2s forwards;
  }
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(12px);}
    to{opacity:1; transform:translateY(0);}
  }
  .btn{
    display:block;
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:var(--ink);
    color:var(--bg);
    font-family:inherit;
    font-size:16px;
    font-weight:700;
    letter-spacing:0.02em;
    cursor:pointer;
    text-decoration:none;
    opacity:0;
    animation:fadeUp .7s ease .3s forwards;
  }
  .btn:active{opacity:.85;}
  .footnote{
    margin-top:20px;
    font-size:12.5px;
    color:var(--ink-soft);
    opacity:0;
    animation:fadeUp .7s ease .4s forwards;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="mark">自</div>
  <h1>歡迎回來,<br>把體驗留在生活裡</h1>
  <div class="tagline">
    接下來的七天,每天只需要幾分鐘。<br>
    不需要準備什麼,只需要願意坐下來。
  </div>
  <a class="btn" href="day.html" id="startBtn">開始今天的練習 »</a>
  <div class="footnote">完全免費・不需要任何宗教背景</div>
</div>

<script>
  // 捕捉QR現場 / LINE推播的來源參數,存一次即可
  (function(){
    var KEY = 'sy7_source';
    if(localStorage.getItem(KEY)) return;
    var params = new URLSearchParams(window.location.search);
    var src = params.get('src');
    if(src) localStorage.setItem(KEY, src);
  })();

  // 註冊 service worker,支援離線與加到主畫面
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(err){
        console.error('SW registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
