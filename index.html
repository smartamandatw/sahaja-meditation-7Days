<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="靜坐7天">
<meta name="theme-color" content="#1a1208">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Sahaja Yoga｜7天靜坐</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8d5a3;
  --deep: #1a1208;
  --warm: #2d1f0a;
  --cream: #f5efe3;
  --rose: #c97b5a;
  --sage: #7a9e7e;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--deep);
  color: var(--cream);
  font-family: 'Noto Serif TC', serif;
  overscroll-behavior: none;
}

/* ── APP SHELL ── */
#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding-top: var(--safe-top);
}

/* ── SCREENS ── */
.screen {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
}
.screen.active { display: flex; }

/* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
#homeScreen {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(80px + var(--safe-bottom));
}

.home-header {
  position: relative;
  padding: 32px 24px 0;
  text-align: center;
  overflow: hidden;
}

/* 首頁背景圖 */
.home-header.has-image {
  padding-top: 0;
  min-height: 260px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}
.home-header-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
}
.home-header-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(26,18,8,0.3) 0%, rgba(26,18,8,0.85) 70%, var(--deep) 100%);
}
.home-header-text {
  position: relative;
  z-index: 2;
  padding: 0 24px 0;
}

.home-header .mandala-ring {
  position: absolute;
  top: -80px; left: 50%;
  transform: translateX(-50%);
  width: 280px; height: 280px;
  opacity: 0.05;
  animation: spin 90s linear infinite;
}

@keyframes spin { to { transform: translateX(-50%) rotate(360deg); } }

.home-header .tag {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--gold);
  margin-bottom: 8px;
  display: block;
}

.home-header h1 {
  font-size: 30px;
  font-weight: 900;
  letter-spacing: 3px;
  line-height: 1.3;
  margin-bottom: 6px;
}
.home-header h1 span { color: var(--gold); }

.home-header .sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  color: var(--gold-light);
  opacity: 0.7;
  margin-bottom: 24px;
}

/* Progress ring */
.progress-ring-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 24px;
  gap: 8px;
}

.ring-container {
  position: relative;
  width: 110px; height: 110px;
}

.ring-svg {
  width: 110px; height: 110px;
  transform: rotate(-90deg);
}

.ring-track { fill: none; stroke: rgba(201,168,76,0.1); stroke-width: 6; }
.ring-fill  { fill: none; stroke: url(#goldGrad); stroke-width: 6;
              stroke-linecap: round; transition: stroke-dashoffset 1s ease; }

.ring-center {
  position: absolute;
  inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

.ring-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--gold);
  line-height: 1;
}

.ring-label {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--gold-light);
  opacity: 0.6;
}

.progress-text {
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--gold-light);
  opacity: 0.7;
}

/* Gold divider */
.gold-line {
  width: 100%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
  margin: 0 0 16px;
}

/* Day list */
.days-list {
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.day-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: linear-gradient(135deg, rgba(45,31,10,0.7), rgba(26,18,8,0.8));
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.day-row::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  border-radius: 3px 0 0 3px;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.3s;
}

.day-row:active { transform: scale(0.98); }
.day-row.done::before { opacity: 1; }
.day-row.done { border-color: rgba(122,158,126,0.3); }

.day-row-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 300;
  color: var(--gold);
  min-width: 36px;
  line-height: 1;
}

.day-row.done .day-row-num { color: var(--sage); }

.day-row-info { flex: 1; }

.day-row-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 3px;
}

.day-row-focus {
  font-size: 11px;
  color: var(--gold-light);
  opacity: 0.65;
  letter-spacing: 1px;
}

.day-row-icon { font-size: 22px; }

.day-row-badge {
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 12px;
  border: 1px solid rgba(201,168,76,0.25);
  color: var(--gold-light);
  opacity: 0.7;
  flex-shrink: 0;
}

.day-row.done .day-row-badge {
  border-color: var(--sage);
  color: var(--sage);
  opacity: 1;
}

/* ══════════════════════════════
   MEDITATION SCREEN
══════════════════════════════ */
#meditateScreen { background: var(--deep); }

.med-header {
  display: flex;
  align-items: center;
  padding: 16px 20px 12px;
  gap: 12px;
  border-bottom: 1px solid rgba(201,168,76,0.1);
  flex-shrink: 0;
}

.back-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid rgba(201,168,76,0.3);
  background: transparent;
  color: var(--gold);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}

.back-btn:active { background: rgba(201,168,76,0.1); }

.med-header-info { flex: 1; }
.med-header-day {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 11px;
  letter-spacing: 4px;
  color: var(--gold);
}
.med-header-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1px;
  line-height: 1.3;
}

.med-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 20px calc(100px + var(--safe-bottom));
}

/* Day image banner */
.day-img-banner {
  width: 100%;
  height: 180px;
  position: relative;
  overflow: hidden;
  border-radius: 14px;
  margin-bottom: 16px;
  flex-shrink: 0;
}
.day-img-banner img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center;
}
.day-img-banner-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(26,18,8,0.7) 100%);
}

/* Tab selector inside meditate screen */
.med-tabs {
  display: flex;
  gap: 0;
  background: rgba(45,31,10,0.6);
  border-radius: 10px;
  padding: 3px;
  margin-bottom: 20px;
}

.med-tab {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  font-family: 'Noto Serif TC', serif;
  font-size: 12px;
  letter-spacing: 1px;
  border: none;
  background: transparent;
  color: var(--gold-light);
  opacity: 0.5;
  cursor: pointer;
  transition: all 0.3s;
}

.med-tab.active {
  background: var(--gold);
  color: var(--deep);
  opacity: 1;
  font-weight: 600;
}

.med-panel { display: none; }
.med-panel.active { display: block; }

/* Steps */
.step-card {
  background: linear-gradient(135deg, rgba(45,31,10,0.7), rgba(26,18,8,0.8));
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 10px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.step-circle {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  color: var(--gold);
}

.step-content { flex: 1; }
.step-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--gold-light);
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.step-desc {
  font-size: 13px;
  line-height: 1.85;
  color: var(--cream);
  opacity: 0.85;
}

/* Affirmation */
.affirmation-card {
  background: rgba(201,168,76,0.06);
  border-left: 2px solid var(--gold);
  border-radius: 0 10px 10px 0;
  padding: 14px 16px;
  margin-top: 6px;
}
.aff-tag {
  font-size: 9px; letter-spacing: 3px;
  color: var(--gold); text-transform: uppercase; margin-bottom: 6px;
}
.aff-body {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 17px;
  line-height: 1.6;
  color: var(--gold-light);
}

/* Tip */
.tip-card {
  margin-top: 10px;
  background: rgba(201,100,60,0.06);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 12.5px;
  line-height: 1.85;
  color: var(--cream);
  opacity: 0.75;
}
.tip-card::before {
  content: '✦ 小提示：';
  color: var(--rose);
  font-weight: 600;
}

/* ── TIMER PANEL ── */
.timer-panel {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
  gap: 28px;
}

/* Breathing ring */
.breath-ring {
  position: relative;
  width: 200px; height: 200px;
}

.breath-svg {
  width: 200px; height: 200px;
  position: absolute; inset: 0;
}

.breath-outer {
  fill: none;
  stroke: rgba(201,168,76,0.08);
  stroke-width: 2;
}

.breath-pulse {
  fill: none;
  stroke: rgba(201,168,76,0.15);
  stroke-width: 1;
  animation: breathPulse 4s ease-in-out infinite;
}

@keyframes breathPulse {
  0%, 100% { r: 70; opacity: 0.2; }
  50%       { r: 88; opacity: 0.5; }
}

.breath-track { fill: none; stroke: rgba(201,168,76,0.12); stroke-width: 6; }
.breath-fill  { fill: none; stroke: var(--gold); stroke-width: 6;
                stroke-linecap: round; transition: stroke-dashoffset 0.9s linear; }

.timer-center {
  position: absolute;
  inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
}

.timer-big {
  font-family: 'Cormorant Garamond', serif;
  font-size: 52px;
  font-weight: 300;
  color: var(--gold);
  letter-spacing: 3px;
  line-height: 1;
}

.timer-sub {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--gold-light);
  opacity: 0.5;
}

/* Control buttons */
.timer-controls {
  display: flex;
  gap: 14px;
  align-items: center;
}

.btn-ghost {
  padding: 10px 24px;
  border-radius: 24px;
  border: 1px solid rgba(201,168,76,0.35);
  background: transparent;
  color: var(--gold);
  font-family: 'Noto Serif TC', serif;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s;
}
.btn-ghost:active { background: rgba(201,168,76,0.1); }

.btn-primary {
  padding: 12px 32px;
  border-radius: 28px;
  border: none;
  background: var(--gold);
  color: var(--deep);
  font-family: 'Noto Serif TC', serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(201,168,76,0.3);
}
.btn-primary:active { transform: scale(0.97); }

.btn-complete {
  width: 100%;
  max-width: 280px;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--sage);
  background: rgba(122,158,126,0.08);
  color: var(--sage);
  font-family: 'Noto Serif TC', serif;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s;
}
.btn-complete:active { background: rgba(122,158,126,0.18); }
.btn-complete.done {
  background: rgba(122,158,126,0.2);
  border-color: var(--sage);
  font-weight: 600;
}

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(64px + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(18, 12, 4, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(201,168,76,0.12);
  display: flex;
  align-items: stretch;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  padding-bottom: 4px;
}

.nav-icon { font-size: 20px; line-height: 1; transition: transform 0.2s; }
.nav-label { font-size: 10px; letter-spacing: 1px; color: rgba(201,168,76,0.4); }
.nav-btn.active .nav-label { color: var(--gold); }
.nav-btn.active .nav-icon { transform: scale(1.15); }

/* ── SETTINGS SCREEN ── */
#settingsScreen {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 32px 20px calc(80px + var(--safe-bottom));
}

.settings-title {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 2px;
  margin-bottom: 6px;
}

.settings-sub {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--gold);
  opacity: 0.7;
  margin-bottom: 28px;
}

.settings-section {
  margin-bottom: 24px;
}

.settings-section-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 12px;
  opacity: 0.7;
}

.settings-row {
  background: rgba(45,31,10,0.6);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.settings-row-label { font-size: 14px; letter-spacing: 1px; }
.settings-row-sub { font-size: 11px; color: var(--gold-light); opacity: 0.55; margin-top: 2px; }

.toggle {
  width: 44px; height: 24px;
  background: rgba(201,168,76,0.15);
  border-radius: 12px;
  border: 1px solid rgba(201,168,76,0.2);
  position: relative;
  cursor: pointer;
  transition: background 0.3s;
  flex-shrink: 0;
}
.toggle.on { background: var(--gold); border-color: var(--gold); }
.toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(245,239,227,0.5);
  transition: transform 0.3s;
}
.toggle.on::after {
  transform: translateX(20px);
  background: var(--deep);
}

.reset-btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(201,100,60,0.3);
  background: rgba(201,100,60,0.06);
  color: var(--rose);
  font-family: 'Noto Serif TC', serif;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s;
  margin-top: 8px;
}
.reset-btn:active { background: rgba(201,100,60,0.15); }

.about-block {
  text-align: center;
  padding: 24px 0 0;
}
.about-logo { font-size: 36px; margin-bottom: 8px; }
.about-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 4px;
}
.about-desc {
  font-size: 12px;
  line-height: 1.8;
  color: var(--gold-light);
  opacity: 0.5;
}

/* install toast */
#installToast {
  position: fixed;
  bottom: calc(80px + var(--safe-bottom) + 12px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--gold);
  color: var(--deep);
  padding: 12px 20px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1px;
  white-space: nowrap;
  opacity: 0;
  transition: all 0.4s;
  pointer-events: none;
  z-index: 200;
  box-shadow: 0 8px 30px rgba(201,168,76,0.4);
}
#installToast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; cursor: pointer; }

/* Animations */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.fade-up { animation: fadeUp 0.5s ease both; }

/* ── AUDIO ── */
.audio-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(201,168,76,0.07);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  margin-top: 8px;
  cursor: pointer;
  transition: all 0.25s;
  user-select: none;
}
.audio-bar:active { background: rgba(201,168,76,0.14); }
.audio-bar.playing { border-color: rgba(201,168,76,0.55); background: rgba(201,168,76,0.1); }

.audio-play-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--gold);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 13px;
  color: var(--deep);
  transition: transform 0.2s;
}
.audio-bar.playing .audio-play-btn { transform: scale(1.05); }

.audio-info { flex: 1; min-width: 0; }
.audio-label {
  font-size: 12px; font-weight: 600;
  color: var(--gold-light); letter-spacing: 1px;
  margin-bottom: 4px;
}
.audio-progress-track {
  height: 3px;
  background: rgba(201,168,76,0.15);
  border-radius: 3px;
  overflow: hidden;
}
.audio-progress-fill {
  height: 100%;
  background: var(--gold);
  border-radius: 3px;
  width: 0%;
  transition: width 0.3s linear;
}
.audio-time {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  color: rgba(201,168,76,0.5);
  margin-top: 3px;
}

/* Timer guide audio */
.timer-audio-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: rgba(201,168,76,0.05);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 10px;
  width: 100%;
  max-width: 280px;
  cursor: pointer;
  transition: all 0.25s;
}
.timer-audio-row:active { background: rgba(201,168,76,0.12); }
.timer-audio-row.playing { border-color: rgba(201,168,76,0.45); }

.timer-audio-icon { font-size: 20px; }
.timer-audio-label {
  flex: 1;
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--gold-light);
  opacity: 0.8;
}
.timer-audio-status {
  font-size: 11px;
  color: var(--gold);
  opacity: 0.6;
}

/* no-audio placeholder */
.no-audio-hint {
  font-size: 11px;
  color: rgba(201,168,76,0.35);
  letter-spacing: 1px;
  text-align: center;
  padding: 6px 0;
  font-style: italic;
}

/* Audio upload row in settings */
.audio-upload-row {
  background: rgba(45,31,10,0.6);
  border: 1px solid rgba(201,168,76,0.12);
  border-radius: 12px;
  padding: 14px 18px;
  margin-bottom: 8px;
}

function init() {
  // 填入 APP_INFO 內容
  document.getElementById('appTag').textContent   = APP_INFO.標語;
  document.title = APP_INFO.名稱;
  const titleEl = document.getElementById('appTitle');

  document.getElementById('aboutName').textContent = APP_INFO.名稱.split('｜')[0];
  document.getElementById('aboutDesc').innerHTML  =
    APP_INFO.創辦人介紹.replace('\n','<br>') + '<br><br>' + APP_INFO.道場;

  // 首頁背景圖
  if (APP_INFO.首頁背景圖) {
    const hdr = document.getElementById('homeHeader');
    hdr.classList.add('has-image');
    document.getElementById('homeMandala').style.display = 'none';
    const img = document.createElement('img');
    img.src = APP_INFO.首頁背景圖;
    img.className = 'home-header-img';
    img.alt = '';
    const overlay = document.createElement('div');
    overlay.className = 'home-header-overlay';
    const textDiv = document.getElementById('homeHeaderText');
    textDiv.className = 'home-header-text';
    hdr.insertBefore(img, hdr.firstChild);
    hdr.insertBefore(overlay, textDiv);
  }

  renderHome();
  renderSettings();
  registerSW();
  showInstallHint();
}

function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

// ── HOME ──

  const done = completed.length;

  const circ = 289;
  document.getElementById('ringFill').style.strokeDashoffset = circ - (circ * done / 7);
  document.getElementById('ringNum').textContent = done;
  document.getElementById('progressText').textContent =
    done === 0 ? '尚未開始修習' :
    done === 7 ? '🎉 恭喜完成7天！' :
    `已完成 ${done} 天，繼續加油！`;

  // list
  const list = document.getElementById('daysList');
  list.innerHTML = '';
  DAYS.forEach((d, i) => {
    const isDone = completed.includes(d.id);
    const row = document.createElement('div');
    row.className = 'day-row fade-up' + (isDone ? ' done' : '');
    row.style.animationDelay = (i * 0.07) + 's';
    row.innerHTML = `
      <div class="day-row-num">${String(d.id).padStart(2,'0')}</div>
      <div class="day-row-info">
        <div class="day-row-title">${d.title}</div>
        <div class="day-row-focus">${d.focus}</div>
      </div>
      <div class="day-row-icon">${d.icon}</div>
      <div class="day-row-badge">${isDone ? '✓ 完成' : '第'+['','一','二','三','四','五','六','七'][d.id]+'天'}</div>
    `;
    row.onclick = () => openDay(d.id);
    list.appendChild(row);
  });
}

// ── NAVIGATION ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (name === 'home') {
    document.getElementById('homeScreen').classList.add('active');
    document.getElementById('navHome').classList.add('active');
    renderHome();
  } else if (name === 'settings') {
    document.getElementById('settingsScreen').classList.add('active');
    document.getElementById('navSettings').classList.add('active');
    renderAudioSlots();
  }
}

function openDay(id) {
  currentDay = DAYS.find(d => d.id === id);
  resetTimer();
  renderMedScreen();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('meditateScreen').classList.add('active');
  // Switch to steps tab
  switchTab('steps');
}

function goBack() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerState = 'idle';
  stopAudio();
  showScreen('home');
}

// ── MEDITATE SCREEN ──
function renderMedScreen() {
  const d = currentDay;
  document.getElementById('medDay').textContent = `Day ${d.id} · 第${'一二三四五六七'[d.id-1]}天`;
  document.getElementById('medTitle').textContent = d.title;
  document.getElementById('medIcon').textContent = d.icon;

  // Steps
  // 每天圖片 banner
  const existingBanner = document.getElementById('dayImgBanner');
  if (existingBanner) existingBanner.remove();
  if (d.image) {
    const banner = document.createElement('div');
    banner.id = 'dayImgBanner';
    banner.className = 'day-img-banner';
    banner.innerHTML = `<img src="${d.image}" alt="${d.title}"><div class="day-img-banner-overlay"></div>`;
    document.getElementById('stepsContent').parentNode.insertBefore(
      banner, document.getElementById('stepsContent').parentNode.firstChild
    );
  }

  document.getElementById('stepsContent').innerHTML = d.steps.map((s, i) => `
    <div class="step-card fade-up" style="animation-delay:${i*0.08}s">
      <div class="step-circle">${i+1}</div>
      <div class="step-content">
        <div class="step-label">${s.t}</div>
        <div class="step-desc">${s.d}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('affContent').innerHTML = `
    <div class="aff-tag">今日冥想語</div>
    <div class="aff-body">${d.affirmation}</div>
  `;
  document.getElementById('tipContent').textContent = d.tip;

  // Audio bar (inserted after render)
  setTimeout(renderStepAudioBars, 50);
  renderTimerAudioRow();

  // Complete button
  const isDone = completed.includes(d.id);
  const btn = document.getElementById('completeBtn');
  btn.textContent = isDone ? '✓ 已完成今天' : '✓ 標記今天已完成';
  btn.classList.toggle('done', isDone);
}

function switchTab(tab) {
  document.querySelectorAll('.med-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'steps') || (i === 1 && tab === 'timer'));
  });
  document.getElementById('stepsPanel').classList.toggle('active', tab === 'steps');
  document.getElementById('timerPanel').classList.toggle('active', tab === 'timer');
}

// ── TIMER ──
function updateTimerUI() {
  const m = Math.floor(timeLeft / 60).toString().padStart(2,'0');
  const s = (timeLeft % 60).toString().padStart(2,'0');
  document.getElementById('timerDisplay').textContent = `${m}:${s}`;
  // ring
  const circ = 490;
  const offset = circ * (1 - timeLeft / TOTAL);
  document.getElementById('timerRing').style.strokeDashoffset = offset;
}

function toggleTimer() {
  if (timerState === 'idle' || timerState === 'paused') {
    startTimer();
  } else if (timerState === 'running') {
    pauseTimer();
  } else if (timerState === 'done') {
    resetTimer();
    startTimer();
  }
}

function startTimer() {
  timerState = 'running';
  document.getElementById('timerBtn').textContent = '暫停';
  document.getElementById('timerStatus').textContent = '靜坐中…';
  playGuideAudioOnStart();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(timerInterval); timerInterval = null;
      timerState = 'done';
      document.getElementById('timerDisplay').textContent = '完成 ✓';
      document.getElementById('timerStatus').textContent = '靜坐完成';
      document.getElementById('timerBtn').textContent = '再來一次';
      document.getElementById('timerRing').style.strokeDashoffset = 490;
      if (settings.vibrate && navigator.vibrate) navigator.vibrate([200, 100, 200]);
      if (settings.autoBack) setTimeout(goBack, 2000);
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval); timerInterval = null;
  timerState = 'paused';
  document.getElementById('timerBtn').textContent = '繼續';
  document.getElementById('timerStatus').textContent = '已暫停';
}

function resetTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  timerState = 'idle';
  timeLeft = TOTAL;
  document.getElementById('timerDisplay').textContent = '01:00';
  document.getElementById('timerStatus').textContent = '準備開始';
  document.getElementById('timerBtn').textContent = '開始靜坐';
  document.getElementById('timerRing').style.strokeDashoffset = 0;
}

function markDone() {
  if (!completed.includes(currentDay.id)) {
    completed.push(currentDay.id);
    localStorage.setItem('sahaja_done', JSON.stringify(completed));
  }
  const btn = document.getElementById('completeBtn');
  btn.textContent = '✓ 已完成今天';
  btn.classList.add('done');
  if (settings.vibrate && navigator.vibrate) navigator.vibrate(100);
}

// ── SETTINGS ──
function renderSettings() {
  document.getElementById('vibrateToggle').classList.toggle('on', settings.vibrate);
  document.getElementById('autoBackToggle').classList.toggle('on', settings.autoBack);
}

function toggleSetting(key) {
  settings[key] = !settings[key];
  localStorage.setItem('sahaja_settings', JSON.stringify(settings));
  renderSettings();
}

function confirmReset() {
  if (confirm('確定要重置所有進度嗎？')) {
    completed = [];
    localStorage.removeItem('sahaja_done');
    renderHome();
    alert('進度已重置 🙏');
  }
}

// ── INSTALL HINT ──
let deferredPrompt;
function showInstallHint() {
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    const toast = document.getElementById('installToast');
    toast.classList.add('show');
    toast.onclick = () => {
      deferredPrompt.prompt();
      toast.classList.remove('show');
    };
    setTimeout(() => toast.classList.remove('show'), 6000);
  });
}

// ── AUDIO SYSTEM ──
// audioStore: { 'day_1': base64dataURL, ... }
let audioStore = JSON.parse(localStorage.getItem('sahaja_audio') || '{}');
let currentAudio = null; // active Audio object
let stepAudioInterval = null;

const AUDIO_LABELS = ['第一天','第二天','第三天','第四天','第五天','第六天','第七天'];

function saveAudioStore() {
  try { localStorage.setItem('sahaja_audio', JSON.stringify(audioStore)); } catch(e) {
    alert('儲存空間不足，建議清除部分音檔。');
  }
}

// Read file as base64 dataURL
function readFileAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// Upload handler
async function handleAudioUpload(dayId, input) {
  const file = input.files[0];
  if (!file) return;
  const key = 'day_' + dayId;
  try {
    const dataURL = await readFileAsDataURL(file);
    audioStore[key] = dataURL;
    saveAudioStore();
    renderAudioSlots();
    // refresh timer audio row if same day open
    if (currentDay && currentDay.id === dayId) renderTimerAudioRow();
  } catch(e) { alert('音檔載入失敗，請重試。'); }
}

function clearAllAudio() {
  if (!confirm('確定清除所有音檔？')) return;
  audioStore = {};
  localStorage.removeItem('sahaja_audio');
  renderAudioSlots();
  renderTimerAudioRow();
}

function renderAudioSlots() {
  const el = document.getElementById('audioSlots');
  if (!el) return;
  el.innerHTML = DAYS.map(d => {
    const key = 'day_' + d.id;
    const has = !!audioStore[key];
    return `
      <label class="audio-slot ${has ? 'has-audio' : ''}">
        <input type="file" accept="audio/*" onchange="handleAudioUpload(${d.id}, this)">
        <span class="audio-slot-icon">${has ? '🔊' : '🎙️'}</span>
        <span class="audio-slot-label">${d.icon} ${AUDIO_LABELS[d.id-1]}</span>
        <span class="audio-slot-status">${has ? '已上傳 ✓' : '點擊上傳'}</span>
      </label>`;
  }).join('');
}

// Stop any playing audio
function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
  // reset all audio bar UIs
  document.querySelectorAll('.audio-bar').forEach(b => {
    b.classList.remove('playing');
    b.querySelector('.audio-play-btn').textContent = '▶';
    b.querySelector('.audio-progress-fill').style.width = '0%';
    b.querySelector('.audio-time').textContent = '';
  });
  renderTimerAudioRow();
}

// Play audio for a step bar
function toggleStepAudio(dayId, stepIdx, barEl) {
  const key = 'day_' + dayId;
  const src = audioStore[key];
  if (!src) return;

  // If this bar is already playing, stop
  if (barEl.classList.contains('playing')) { stopAudio(); return; }
  stopAudio();

  const audio = new Audio(src);
  currentAudio = audio;
  barEl.classList.add('playing');
  barEl.querySelector('.audio-play-btn').textContent = '⏸';

  const fill = barEl.querySelector('.audio-progress-fill');
  const timeEl = barEl.querySelector('.audio-time');

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
    const rem = Math.ceil(audio.duration - audio.currentTime);
    timeEl.textContent = `${rem}s`;
  });
  audio.addEventListener('ended', () => {
    barEl.classList.remove('playing');
    barEl.querySelector('.audio-play-btn').textContent = '▶';
    fill.style.width = '100%';
    currentAudio = null;
  });
  audio.play().catch(() => {});
}

// Render step audio bars inside stepsContent
function renderStepAudioBars() {
  if (!currentDay) return;
  const key = 'day_' + currentDay.id;
  if (!audioStore[key]) return; // no audio uploaded for this day

  // Add one shared audio bar at top of steps panel
  const existing = document.getElementById('stepAudioBar');
  if (existing) return;

  const bar = document.createElement('div');
  bar.id = 'stepAudioBar';
  bar.className = 'audio-bar';
  bar.innerHTML = `
    <div class="audio-play-btn">▶</div>
    <div class="audio-info">
      <div class="audio-label">🎙 今日引導朗讀</div>
      <div class="audio-progress-track"><div class="audio-progress-fill"></div></div>
      <div class="audio-time"></div>
    </div>
  `;
  bar.onclick = () => toggleStepAudio(currentDay.id, 0, bar);
  const stepsContent = document.getElementById('stepsContent');
  stepsContent.parentNode.insertBefore(bar, stepsContent);
}

// Timer audio row
function renderTimerAudioRow() {
  const el = document.getElementById('timerAudioRow');
  if (!el || !currentDay) return;
  const key = 'day_' + currentDay.id;
  const src = audioStore[key];
  if (!src) {
    el.innerHTML = `<div class="no-audio-hint">尚未上傳引導音檔（可在設定中上傳）</div>`;
    return;
  }
  const isPlaying = currentAudio && !currentAudio.paused && el.querySelector('.playing');
  el.innerHTML = `
    <div class="timer-audio-row" id="timerAudioRowInner" onclick="toggleTimerAudio()">
      <span class="timer-audio-icon">🎙</span>
      <span class="timer-audio-label">播放今日引導音檔</span>
      <span class="timer-audio-status" id="timerAudioStatus">▶ 播放</span>
    </div>
  `;
}

function toggleTimerAudio() {
  if (!currentDay) return;
  const key = 'day_' + currentDay.id;
  const src = audioStore[key];
  if (!src) return;
  const rowEl = document.getElementById('timerAudioRowInner');
  const statusEl = document.getElementById('timerAudioStatus');

  if (currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    if (statusEl) statusEl.textContent = '▶ 播放';
    rowEl && rowEl.classList.remove('playing');
    return;
  }

  if (currentAudio && currentAudio.paused && currentAudio.src) {
    currentAudio.play();
    if (statusEl) statusEl.textContent = '⏸ 暫停';
    rowEl && rowEl.classList.add('playing');
    return;
  }

  stopAudio();
  const audio = new Audio(src);
  currentAudio = audio;
  rowEl && rowEl.classList.add('playing');
  if (statusEl) statusEl.textContent = '⏸ 暫停';

  audio.addEventListener('ended', () => {
    rowEl && rowEl.classList.remove('playing');
    if (statusEl) statusEl.textContent = '▶ 播放';
    currentAudio = null;
  });
  audio.play().catch(() => {});
}

// Auto-play guide audio when timer starts
function playGuideAudioOnStart() {
  if (!currentDay) return;
  const key = 'day_' + currentDay.id;
  const src = audioStore[key];
  if (!src) return;
  stopAudio();
  const audio = new Audio(src);
  currentAudio = audio;
  const rowEl = document.getElementById('timerAudioRowInner');
  const statusEl = document.getElementById('timerAudioStatus');
  rowEl && rowEl.classList.add('playing');
  if (statusEl) statusEl.textContent = '⏸ 暫停';
  audio.addEventListener('ended', () => {
    rowEl && rowEl.classList.remove('playing');
    if (statusEl) statusEl.textContent = '▶ 播放';
    currentAudio = null;
  });
  audio.play().catch(() => {});
}

init();
</script>
